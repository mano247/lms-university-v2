<div class="content">
    <h2>Office Supplies</h2>
    <div class="dugme">
        <p-button label="New Item" (onClick)="openAddDialog()" />
    </div>
    <div class="pretraga">
        <p-inputGroup>
            <input type="text" [(ngModel)]="search.name" pInputText placeholder="Name" />
        </p-inputGroup>
        <p-button icon="pi pi-search" (click)="searchInventory()" rounded="true" [raised]="true" />
        <p-button icon="pi pi-times" (click)="clearSearch()" rounded="true" [raised]="true" severity="danger"  />
    </div>
    <p-table [value]="filteredInventory">
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
                <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
                <th pSortableColumn="quantity">Quantity <p-sortIcon field="quantity"></p-sortIcon></th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-i let-rowIndex="rowIndex">
            <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                <td>{{ i.id }}</td>
                <td>{{ i.name }}</td>
                <td [ngClass]="{'low-quantity': i.quantity < 10}">
                    {{ i.quantity }}
                </td>
                <td>
                    <p-button icon="pi pi-minus-circle" rounded="true" severity="danger" (onClick)="issueItem(i)" />
                    <p-button label="Request" severity="info" (onClick)="requestItem(i)" />
                </td>
            </tr>
        </ng-template>
    </p-table>
    <p-dialog header="Add Inventory Item" [(visible)]="visible" modal="modal" [closable]="true">
            <div class="p-field">
                <label for="itemName">Name</label>
                <input id="itemName" type="text" pInputText [(ngModel)]="newItem.name" />
            </div>
            <div class="p-field">
                <label for="itemQuantity">Quantity</label>
                <input id="itemQuantity" type="number" step="1" [(ngModel)]="newItem.quantity"  >
            </div>
        <p-footer>
            <p-button label="Save" rounded="true" severity="success" icon="pi pi-check" (click)="addItem()" />
            <p-button label="Cancel" rounded="true" severity="danger" icon="pi pi-times" (click)="closeDialog()" class="p-button-secondary" />
        </p-footer>
    </p-dialog>

    <p-dialog header="Request Inventory" [(visible)]="requestVisible" modal="modal" [closable]="true">
        <div class="p-fluid">
            <div class="p-field">
                <label for="addQty">Quantity</label>
                <input id="addQty" type="text" pInputText [(ngModel)]="additionalQuantity" />
            </div>
        </div>
        <p-footer>
            <p-button label="Save" rounded="true" severity="success" icon="pi pi-check" (click)="processRequest()" />
            <p-button label="Cancel" rounded="true" severity="danger" icon="pi pi-times" (click)="closeDialog()" class="p-button-secondary" />
        </p-footer>
    </p-dialog>

    <p-toast />
</div>
