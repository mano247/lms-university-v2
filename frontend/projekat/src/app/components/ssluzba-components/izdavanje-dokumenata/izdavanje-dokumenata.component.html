<div class="content">
    <h2>Izdavanje dokumenata</h2>
    <div class="dugme">
        <p>Profesori</p>
        <p-inputSwitch [(ngModel)]="visible" />
        <p>Studenti</p>
    </div>
    <div *ngIf="!visible">
        <div class="pretraga">
            <p-inputGroup>
                <input type="text" [(ngModel)]="search.firstName" pInputText placeholder=" ime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="search.lastName" pInputText placeholder=" prezime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="search.email" pInputText placeholder="email" />
            </p-inputGroup>
            <p-button icon="pi pi-search" (click)="searchTeachers()" rounded="true" [raised]="true" />
            <p-button icon="pi pi-times" (click)="clearSearch()" rounded="true" [raised]="true" severity="danger"  />
        </div>
        <p-table [value]="filteredTeachers">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">id <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="firstName">ime <p-sortIcon field="firstName"></p-sortIcon></th>
                    <th pSortableColumn="lastName">prezime <p-sortIcon field="lastName"></p-sortIcon></th>
                    <th pSortableColumn="email">email <p-sortIcon field="email"></p-sortIcon></th>
                    <th>export</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-p let-rowIndex="rowIndex">
                <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                    <td>{{ p.id }}</td>
                    <td>{{ p.firstName }}</td>
                    <td>{{ p.lastName }}</td>
                    <td>{{ p.email }}</td>
                    <td>
                        <p-button label="xml" (onClick)="exportTeacherXml(p)" rounded="true" severity="warning" />
                        <p-button label="pdf" (onClick)="exportTeacherPdf(p)" rounded="true" severity="help"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    <div *ngIf="visible">
        <div class="pretraga">
            <p-inputGroup>
                <input type="text" [(ngModel)]="search.firstName" pInputText placeholder=" ime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="search.lastName" pInputText placeholder=" prezime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="search.email" pInputText placeholder="email" />
            </p-inputGroup>
            <p-button icon="pi pi-search" (click)="searchStudents()" rounded="true" [raised]="true" />
            <p-button icon="pi pi-times" (click)="clearSearch()" rounded="true" [raised]="true" severity="danger"  />
        </div>
        <p-table [value]="filteredStudents">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">id <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="firstName">ime <p-sortIcon field="firstName"></p-sortIcon></th>
                    <th pSortableColumn="lastName">prezime <p-sortIcon field="lastName"></p-sortIcon></th>
                    <th pSortableColumn="email">email <p-sortIcon field="email"></p-sortIcon></th>
                    <th>export</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-s let-rowIndex="rowIndex">
                <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                    <td>{{ s.id }}</td>
                    <td>{{ s.firstName }}</td>
                    <td>{{ s.lastName }}</td>
                    <td>{{ s.email }}</td>
                    <td>
                        <p-button label="xml" (onClick)="exportStudentXml(s)" rounded="true" severity="warning" />
                        <p-button label="pdf" (onClick)="exportStudentPdf(s)" rounded="true" severity="help"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
