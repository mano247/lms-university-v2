<div class="content">
    <h2>Obaveštenja</h2>
    <p-dropdown
      [options]="activeCourses"
      optionLabel="name"
      optionValue="id"
      [(ngModel)]="selectedCourseId"
      placeholder="Izaberi predmet"
      (onChange)="onCourseChange($event)">
    </p-dropdown>

    <div>
      <p-dialog header="Dodaj obaveštenje" [modal]="true" [(visible)]="visible">
        <div>
          <p-button label="Dodaj" (onClick)="addAnnouncement()"/>
          <p-button label="Poništi" severity="secondary" (onClick)="visible = false" />
        </div>
        <!-- završi formu za dodavanje -->
      </p-dialog>
    </div>

    <p-dataView #dv [value]="filteredAnnouncements">
      <ng-template pTemplate="list">
        <div *ngFor="let o of filteredAnnouncements">
          <div class="gObavestenje">
            <h4>{{o.title}}</h4>
            <p><span>od: </span> <br> {{formatDate(o.startDate)}}, <br> <span>do: </span> <br>{{formatDate(o.endDate)}}</p>
            <p>{{o.content}}</p>
          </div>
          <p-divider />
        </div>
      </ng-template>
    </p-dataView>

    <p-toast></p-toast>
    <p-confirmPopup></p-confirmPopup>
  </div>
