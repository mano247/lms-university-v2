<div class="content">
    <h2>Exam Registration</h2>
    <p-table [value]="availableCourses" styleClass="p-datatable-striped">
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name">Course <p-sortIcon field="name"></p-sortIcon></th>
                <th pSortableColumn="teacher">Teacher <p-sortIcon field="teacher"></p-sortIcon></th>
                <th pSortableColumn="ects">ECTS <p-sortIcon field="ects"></p-sortIcon></th>
                <th>Options</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-c>
            <tr>
                <td>{{c.name}}</td>
                <td>{{c.teacher?.firstName}} {{c.teacher?.lastName}}</td>
                <td>{{c.ects}}</td>
                <td>
                    <p-button *ngIf="!isCourseRegistered(c)" label="Register" (onClick)="registerForExam($event, c)" />
                </td>
            </tr>
        </ng-template>
    </p-table>

    <h3>Registered Exams</h3>
    <p-table [value]="registeredExams" styleClass="p-datatable-striped">
        <ng-template pTemplate="header">
            <tr>
                <th>Course</th>
                <th>Teacher</th>
                <th>ECTS</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-e>
            <tr>
                <td>{{e.course?.name}}</td>
                <td>{{e.course?.teacher?.firstName}} {{e.course?.teacher?.lastName}}</td>
                <td>{{e.course?.ects}}</td>
            </tr>
        </ng-template>
    </p-table>

    <p-toast />
    <p-confirmDialog />
</div>
