<div class="content">
    <h2>Document Issuance</h2>
    <div class="dugme">
        <p>Teachers</p>
        <p-inputSwitch [(ngModel)]="visible" />
        <p>Students</p>
    </div>
    <div *ngIf="!visible">
        <div class="pretraga">
            <p-inputGroup>
                <input type="text" [(ngModel)]="filter.firstName" pInputText placeholder="First name" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="filter.lastName" pInputText placeholder="Last name" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="filter.email" pInputText placeholder="Email" />
            </p-inputGroup>
            <p-button icon="pi pi-search" (click)="filterTeachers()" rounded="true" [raised]="true" />
            <p-button icon="pi pi-times" (click)="clearFilter()" rounded="true" [raised]="true" severity="danger" />
        </div>
        <p-table [value]="filteredTeachers">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="firstName">First Name <p-sortIcon field="firstName"></p-sortIcon></th>
                    <th pSortableColumn="lastName">Last Name <p-sortIcon field="lastName"></p-sortIcon></th>
                    <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
                    <th>Export</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-p let-rowIndex="rowIndex">
                <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                    <td>{{ p.id }}</td>
                    <td>{{ p.firstName }}</td>
                    <td>{{ p.lastName }}</td>
                    <td>{{ p.email }}</td>
                    <td>
                        <p-button label="XML" (onClick)="xmlTeacher(p)" rounded="true" severity="warning" />
                        <p-button label="PDF" (onClick)="pdfTeacher(p)" rounded="true" severity="help"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    <div *ngIf="visible">
        <div class="pretraga">
            <p-inputGroup>
                <input type="text" [(ngModel)]="filter.firstName" pInputText placeholder="First name" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="filter.lastName" pInputText placeholder="Last name" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="filter.email" pInputText placeholder="Email" />
            </p-inputGroup>
            <p-button icon="pi pi-search" (click)="filterStudents()" rounded="true" [raised]="true" />
            <p-button icon="pi pi-times" (click)="clearFilter()" rounded="true" [raised]="true" severity="danger" />
        </div>
        <p-table [value]="filteredStudents">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="firstName">First Name <p-sortIcon field="firstName"></p-sortIcon></th>
                    <th pSortableColumn="lastName">Last Name <p-sortIcon field="lastName"></p-sortIcon></th>
                    <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
                    <th>Export</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-s let-rowIndex="rowIndex">
                <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                    <td>{{ s.id }}</td>
                    <td>{{ s.firstName }}</td>
                    <td>{{ s.lastName }}</td>
                    <td>{{ s.email }}</td>
                    <td>
                        <p-button label="XML" (onClick)="xmlStudent(s)" rounded="true" severity="warning" />
                        <p-button label="PDF" (onClick)="pdfStudent(s)" rounded="true" severity="help"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
