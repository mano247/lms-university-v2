<div class="content">
    <h2>Library</h2>
    <h3>Textbooks</h3>
    <p-button label="New textbook" (click)="openAddForm()"/>
    <p-dialog header="Add New Textbook" [(visible)]="addVisible" modal="modal" [closable]="true">
        <div class="p-fluid">
            <div class="p-field">
                <label for="title">Title</label>
                <input id="title" type="text" pInputText [(ngModel)]="newMaterial.title" />
            </div>
            <div class="p-field">
                <label for="description">Description</label>
                <textarea id="description" rows="4" pInputTextarea [(ngModel)]="newMaterial.description"></textarea>
            </div>
            <div>
                <p-dropdown [options]="courses" [(ngModel)]="newMaterial.course" optionLabel="name" placeholder="Select course"></p-dropdown>
            </div>
            <div class="p-field">
                <label for="publicationYear">Publication Year</label>
                <input id="publicationYear" type="text" [(ngModel)]="newMaterial.publicationYear">
            </div>
            <div class="p-field">
                <label for="authors">Authors</label>
                <input id="authors" type="text" pInputText [(ngModel)]="newMaterial.authors" />
            </div>
            <div class="p-field">
                <label for="publisher">Publisher</label>
                <input id="publisher" type="text" pInputText [(ngModel)]="newMaterial.publisher" />
            </div>
            <div class="p-field">
                <label for="pageCount">Page count</label>
                <input id="pageCount" type="number" step="1" pInputText [(ngModel)]="newMaterial.pageCount" />
            </div>
            <div class="p-field">
                <label for="quantity">Quantity</label>
                <input id="quantity" type="number" step="1" pInputText [(ngModel)]="newMaterial.quantity" />
            </div>
        </div>
        <p-footer>
            <p-button label="Save" rounded="true" severity="success" icon="pi pi-check" (click)="addMaterial()" />
            <p-button label="Cancel" rounded="true" severity="danger" icon="pi pi-times" (click)="closeAddDialog()" class="p-button-secondary" />
        </p-footer>
    </p-dialog>
    <div class="pretraga">
        <p-inputGroup>
            <input type="text" [(ngModel)]="search.title" pInputText placeholder="Title" />
        </p-inputGroup>
        <p-inputGroup>
            <input type="text" [(ngModel)]="search.author" pInputText placeholder="Author" />
        </p-inputGroup>
        <p-button icon="pi pi-search" (click)="searchMaterials()" rounded="true" [raised]="true" />
        <p-button icon="pi pi-times" (click)="clearFilter()" rounded="true" [raised]="true" severity="danger" />
    </div>
    <p-table [value]="filteredMaterials">
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
                <th pSortableColumn="title">Title <p-sortIcon field="title"></p-sortIcon></th>
                <th pSortableColumn="authors">Author <p-sortIcon field="authors"></p-sortIcon></th>
                <th pSortableColumn="publicationYear">Publication Year <p-sortIcon field="publicationYear"></p-sortIcon></th>
                <th pSortableColumn="quantity">In Stock <p-sortIcon field="quantity"></p-sortIcon></th>
                <th>Options</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-u let-rowIndex="rowIndex">
            <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                <td>{{ u.id }}</td>
                <td>{{ u.title }}</td>
                <td>{{ u.authors }}</td>
                <td>{{ u.publicationYear }}</td>
                <td [ngClass]="{'low-quantity': (u.quantity ?? 0) < 10}">
                    {{ u.quantity }}
                </td>
                <td>
                    <p-button label="Issue" (onClick)="issueTextbook(u)"/>
                    <p-button *ngIf="(u.quantity ?? 0) < 50" label="Request" severity="info" (onClick)="openRequisitionDialog(u)" />
                </td>
            </tr>
        </ng-template>
    </p-table>
    <p-dialog header="Request textbook" [(visible)]="visible" modal="modal" [closable]="true">
        <div class="p-fluid">
            <div class="p-field">
                <label for="quantity">Quantity</label>
                <input id="quantity" type="text" pInputText [(ngModel)]="newQuantity" />
            </div>
        </div>
        <p-footer>
            <p-button label="Save" rounded="true" severity="success" icon="pi pi-check" (click)="submitRequisition()" />
            <p-button label="Cancel" rounded="true" severity="danger" icon="pi pi-times" (click)="closeDialog()" class="p-button-secondary" />
        </p-footer>
    </p-dialog>
    <p-toast />
</div>
