<div class="content">
    <h3>Moj profil</h3>

    <h4>Ime i prezime</h4>
    <p>{{ currentUser?.firstName || 'Ime nije postavljeno' }}</p>
    <p>{{ currentUser?.lastName || 'Prezime nije postavljeno' }}</p>

    <p-divider />

    <h4>email</h4>
    <p>{{currentUser?.email}}</p>

    <p-divider />

    <h4>korisnicko ime</h4>
    <p>{{currentUser?.username}}</p>


    <p-button label="Uredi profil" (onClick)="openEditDialog()" [rounded]="true" [raised]="true"/>

    <p-dialog header="Uredi profil" [modal]="true" [(visible)]="visible" [draggable]="false">
        <form [formGroup]="profileForm" (ngSubmit)="saveChanges()">
            <div class="form-group">
                <label for="firstName">Ime:</label>
                <input pInputText id="firstName" formControlName="firstName" />
            </div>
            <div class="form-group">
                <label for="lastName">Prezime:</label>
                <input pInputText id="lastName" formControlName="lastName"/>
            </div>
            <div class="form-group">
                <label for="email" class="font-semibold w-6rem">Email:</label>
                <input pInputText id="email" type="email" formControlName="email" />
            </div>
            <div class="form-group">
                <label for="username">Korisnicko ime:</label>
                <input pInputText id="username" formControlName="username"/>
            </div>
            <div class="form-group">
                <label for="password">Lozinka:</label>
                <input pInputText id="password" type="password" formControlName="password" />
            </div>
            <div>
                <p-button label="Izmeni" [rounded]="true" [raised]="true" severity="success" type="submit"/>
                <p-button label="Ponisti" [rounded]="true" [raised]="true" severity="danger" (onClick)="visible = false" />
            </div>
        </form>
    </p-dialog>
</div>
<p-toast />
