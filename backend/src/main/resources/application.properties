# Load local-only secrets from .env (gitignored) if present; see .env.example for required keys.
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://localhost:3306/lms_v2?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Java 21 virtual threads for the embedded Tomcat request pool - safe here since
# the codebase has no synchronized blocks that could pin a carrier thread.
spring.threads.virtual.enabled=true


jwtSecret=${JWT_SECRET}
jwtExpirationMs=65000000

app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# File uploads
app.upload.dir=uploads
app.upload.max-image-size-bytes=5242880
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB